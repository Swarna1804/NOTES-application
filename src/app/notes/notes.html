<div [class.dark]="darkMode()">

  <div class="container">

    <h1>Notes App</h1>

    <button
      class="theme-btn"
      (click)="toggleTheme()"
    >

      @if(darkMode()) {
        Dark Mode
      }

      @else {
        Light Mode
      }

    </button>

    <div class="add-section">

      <input
        type="text"
        [(ngModel)]="newNote"
        placeholder="Write a note..."
      />

      <button (click)="addNote()">
        Add Note
      </button>

    </div>

    <div class="search-section">

      <input
        type="text"
        [(ngModel)]="searchText"
        placeholder="Search notes..."
      />

    </div>

    <div class="notes-container">

      @for(
        note of filteredNotes();
        track note.id
      ) {

        <app-note

          [note]="note"

          (deleteEvent)="deleteNote($event)"

          (editEvent)="editNote($event)"

          (pinEvent)="togglePin($event)"

        >
        </app-note>

      }

    </div>

  </div>

</div>
